name: Generate ATP CSV

on:
  workflow_dispatch:

jobs:
  generate-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show repository files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run script
        run: |
          python atp_draw_results_to_csv.py
          echo "----- AFTER SCRIPT -----"
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Upload generated CSV
        uses: actions/upload-artifact@v4
        with:
          name: atp-csv-output
          path: indian_wells_up_to_r64.csv
